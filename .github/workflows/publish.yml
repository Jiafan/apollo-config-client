name: Publish to PyPI

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # 用于 PyPI Trusted Publishing (OIDC)，无需明文 token
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # 使用 PyPI 的 Trusted Publishing：在 pypi.org 的「Publishing」中
        # 添加该仓库的 workflow，无需配置 PYPI_API_TOKEN。
